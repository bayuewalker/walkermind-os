<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#03080e"/>
      <stop offset="100%" style="stop-color:#060d18"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5c4"/>
      <stop offset="100%" style="stop-color:#00a8ff"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="120" fill="url(#bg)" rx="8"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="2" fill="url(#acc)" rx="1"/>
  <!-- Grid lines -->
  <g stroke="#00f5c4" stroke-width="0.3" opacity="0.07">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="200" y1="0" x2="200" y2="120"/>
    <line x1="400" y1="0" x2="400" y2="120"/>
    <line x1="600" y1="0" x2="600" y2="120"/>
  </g>
  <!-- Mini crescent -->
  <circle cx="52" cy="60" r="30" fill="#03080e"/>
  <path d="M52,31 A29,29 0 1,1 52,89 A20,20 0 1,0 52,31 Z" fill="url(#acc)" filter="url(#g)" opacity="0.9"/>
  <!-- Main text -->
  <text x="100" y="48" font-family="'Arial Black',Impact,sans-serif" font-size="28" font-weight="900" fill="url(#acc)" filter="url(#g)" letter-spacing="6">N.W.A.P</text>
  <text x="102" y="70" font-family="'Courier New',monospace" font-size="10" fill="#00f5c4" letter-spacing="3" opacity="0.6">NIGHT WALKER AUTONOMOUS PROTOCOL</text>
  <!-- Divider -->
  <line x1="360" y1="25" x2="360" y2="95" stroke="#00f5c4" stroke-width="0.5" opacity="0.2"/>
  <!-- Right side badges -->
  <g font-family="'Courier New',monospace" font-size="9" letter-spacing="1.5">
    <rect x="380" y="28" width="90" height="18" rx="9" fill="none" stroke="#00f5c4" stroke-width="0.8" opacity="0.5"/>
    <text x="425" y="41" fill="#00f5c4" text-anchor="middle" opacity="0.8">COMMANDER</text>
    <rect x="480" y="28" width="70" height="18" rx="9" fill="none" stroke="#00f5c4" stroke-width="0.8" opacity="0.5"/>
    <text x="515" y="41" fill="#00f5c4" text-anchor="middle" opacity="0.8">FORGE-X</text>
    <rect x="560" y="28" width="70" height="18" rx="9" fill="none" stroke="#00f5c4" stroke-width="0.8" opacity="0.5"/>
    <text x="595" y="41" fill="#00f5c4" text-anchor="middle" opacity="0.8">SENTINEL</text>
    <rect x="640" y="28" width="60" height="18" rx="9" fill="none" stroke="#00f5c4" stroke-width="0.8" opacity="0.5"/>
    <text x="670" y="41" fill="#00f5c4" text-anchor="middle" opacity="0.8">BRIEFER</text>
    <!-- Status row -->
    <text x="382" y="75" fill="#00f5c4" opacity="0.4">STATUS:</text>
    <text x="432" y="75" fill="#00f5c4" opacity="0.8">PAPER BETA</text>
    <text x="532" y="75" fill="#00f5c4" opacity="0.4">PLATFORMS:</text>
    <text x="598" y="75" fill="#00f5c4" opacity="0.8">POLYMARKET · TV · MT5</text>
  </g>
  <!-- Status dot -->
  <circle cx="780" cy="20" r="4" fill="#00f5c4" opacity="0.7"/>
  <!-- Bottom line -->
  <rect x="0" y="118" width="800" height="2" fill="url(#acc)" opacity="0.3" rx="1"/>
</svg>
