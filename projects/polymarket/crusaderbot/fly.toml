# fly.toml — CrusaderBot on Fly.io
# Adjust app name before first deploy: `fly launch --name <your-app-name>`

app = "crusaderbot"
primary_region = "sin"       # Singapore — closest to Asia/Jakarta
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV        = "production"
  PORT           = "8080"
  HOST           = "0.0.0.0"
  TIMEZONE       = "Asia/Jakarta"
  DB_POOL_MAX    = "5"
  LOG_LEVEL      = "INFO"

[[services]]
  protocol    = "tcp"
  internal_port = 8080

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 100

  [[services.http_checks]]
    interval       = "15s"
    timeout        = "5s"
    grace_period   = "30s"
    method         = "GET"
    path           = "/health"
    protocol       = "http"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[metrics]
  port = 8080
  path = "/metrics"
