# fly.toml app configuration file generated for crusaderbot on 2026-05-16T10:56:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "crusaderbot"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python -m crusaderbot.scripts.seed_operator_tier"
  strategy = "immediate"

[env]
  APP_ENV                       = "production"
  PORT                          = "8080"
  HOST                          = "0.0.0.0"
  TIMEZONE                      = "Asia/Jakarta"
  DB_POOL_MAX                   = "5"
  LOG_LEVEL                     = "INFO"
  ENABLE_LIVE_TRADING           = "false"
  EXECUTION_PATH_VALIDATED      = "false"
  CAPITAL_MODE_CONFIRMED        = "false"
  RISK_CONTROLS_VALIDATED       = "false"
  SECURITY_HARDENING_VALIDATED  = "false"
  FEE_COLLECTION_ENABLED        = "false"
  AUTO_REDEEM_ENABLED           = "false"
  HEISENBERG_API_TOKEN          = ""

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024

[metrics]
  port = 8080
  path = "/metrics"

[[http_service.checks]]
  interval     = "15s"
  timeout      = "10s"
  grace_period = "60s"
  method       = "GET"
  path         = "/health"
  protocol     = "http"
