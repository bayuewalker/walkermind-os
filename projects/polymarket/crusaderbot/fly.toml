# fly.toml app configuration file generated for crusaderbot on 2026-05-30T14:00:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'crusaderbot'
primary_region = 'sin'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  APP_ENV = 'production'
  AUTO_REDEEM_ENABLED = 'true'
  CAPITAL_MODE_CONFIRMED = 'false'
  DB_POOL_MAX = '3'
  ENABLE_LIVE_TRADING = 'false'
  EXECUTION_PATH_VALIDATED = 'false'
  FEE_COLLECTION_ENABLED = 'false'
  HOST = '0.0.0.0'
  LOG_LEVEL = 'INFO'
  PORT = '8080'
  RISK_CONTROLS_VALIDATED = 'false'
  SECURITY_HARDENING_VALIDATED = 'false'
  TELEGRAM_BOT_USERNAME = 'CrusaderPolybot'
  TIMEZONE = 'Asia/Jakarta'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024

[[metrics]]
  port = 8080
  path = '/metrics'
