# fly.toml — CrusaderBot on Fly.io
# Fly.io apps v2 format (flyctl v0.2+)
#
# Secrets (TELEGRAM_BOT_TOKEN, DATABASE_URL, REDIS_URL, ALCHEMY_POLYGON_*,
# WALLET_ENCRYPTION_KEY, OPERATOR_CHAT_ID, ...) are NOT defined here.
# Set them via `fly secrets set KEY=VALUE -a crusaderbot` before deploying.

app = "crusaderbot"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python -m crusaderbot.scripts.seed_operator_tier"
  strategy = "rolling"

[env]
  APP_ENV                       = "production"
  PORT                          = "8080"
  HOST                          = "0.0.0.0"
  TIMEZONE                      = "Asia/Jakarta"
  DB_POOL_MAX                   = "5"
  LOG_LEVEL                     = "INFO"
  ENABLE_LIVE_TRADING           = "false"
  EXECUTION_PATH_VALIDATED      = "false"
  CAPITAL_MODE_CONFIRMED        = "false"
  RISK_CONTROLS_VALIDATED       = "false"
  SECURITY_HARDENING_VALIDATED  = "false"
  FEE_COLLECTION_ENABLED        = "false"
  AUTO_REDEEM_ENABLED           = "false"
  HEISENBERG_API_TOKEN          = ""

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[metrics]
  port = 8080
  path = "/metrics"

[[http_service.checks]]
  interval     = "15s"
  timeout      = "10s"
  grace_period = "60s"
  method       = "GET"
  path         = "/health"
  protocol     = "http"
