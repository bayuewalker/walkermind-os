# fly.toml app configuration file generated for crusaderbot on 2026-04-21T03:47:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'crusaderbot'
primary_region = 'iad'

[build]

[env]
  CRUSADER_TELEGRAM_RUNTIME_REQUIRED = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
