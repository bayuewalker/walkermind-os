# fly.toml app configuration file for CrusaderBot paper-only runtime.
# Deployment contract: single API machine with embedded Telegram polling runtime.

app = "crusaderbot"
primary_region = "iad"

[build]

[deploy]
  # Single-machine polling contract: avoid overlapping Telegram pollers.
  strategy = "immediate"

[env]
  CRUSADER_TELEGRAM_RUNTIME_REQUIRED = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "45s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[checks]
  [checks.ready]
    type = "http"
    port = 8080
    method = "GET"
    path = "/ready"
    interval = "30s"
    timeout = "5s"
    grace_period = "45s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
