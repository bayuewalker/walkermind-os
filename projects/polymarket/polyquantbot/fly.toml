app = "crusaderbot"
primary_region = "iad"

[build]
  dockerfile = "projects/polymarket/polyquantbot/Dockerfile"

[env]
  ENV = "production"
  DASHBOARD_ENABLED = "true"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
