trading:
  poll_interval_seconds: 20
  min_ev_threshold: 0.02
  max_concurrent_positions: 5
  max_trades_per_cycle: 2
  max_total_exposure_pct: 0.30
  summary_every_n_cycles: 5

paper:
  enabled: true
  initial_balance: 1000.0
  slippage_bps: 50
  market_depth_threshold: 50.0

execution:
  mode: adaptive                  # phase6 EV-aware routing
  taker_fee_pct: 0.02
  maker_fee_pct: 0.01
  slippage_bps: 50
  max_slippage_pct: 0.03
  base_alpha_buffer: 0.005        # minimum cost cushion
  max_alpha_buffer: 0.05          # cap on alpha buffer
  volatility_scale: 2.0           # spread-implied vol multiplier
  maker_spread_threshold: 0.02    # min spread to prefer MAKER
  maker_timeout_ms: 3000
  hybrid_ev_multiplier: 2.0       # EV > cost * this → force TAKER
  min_order_size: 5.0
  lot_step: 1.0
  liquidity_cap_pct: 0.10         # max 10% of market volume
  fill_prob_threshold: 0.60
  max_partial_retries: 1
  partial_slippage_bps: 75
  market_depth_threshold: 50.0

capital_allocator:
  max_position_pct: 0.10          # hard cap 10% of balance
  max_open_positions: 5
  min_order_size: 5.0

correlation:
  max_corr_adjustment: 0.3        # max log-odds shift per correlation
  # correlation_matrix populated at runtime from market data
  # format: "market_id_a:market_id_b" -> float

market_maker:
  enabled: false                  # enable in Phase 7 when live
  spread_pct: 0.02
  size: 10.0
  cooldown_seconds: 60.0

position:
  tp_pct: 0.10
  sl_pct: 0.05
  timeout_minutes: 30

strategy:
  enabled:
    bayesian: true
    momentum: true
    mean_reversion: true
    arbitrage: true
  disable_threshold: 0.4
  min_trades: 20
  momentum_threshold: 0.02
  mean_reversion_k: 2.0
  fee_margin: 0.02

circuit_breaker:
  max_consecutive_losses: 3
  max_api_failures: 5
  latency_breach_threshold_ms: 1000
  cooldown_seconds: 120

latency_budgets:
  signal_ms: 200
  execution_ms: 500
  total_ms: 1000

health:
  port: 8080
