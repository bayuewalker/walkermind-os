name: WARP Gate — Events v2

# Unified event dispatcher ke WARP•GATE (Base44 agent).
# Coverage: PR opened/updated, issue opened/updated, PR review comment, issue comment.
#
# gate-pr.yml DISABLED — workflow ini menggantikan seluruh notifikasi PR.
# Menggunakan Base44 REST API langsung (POST /conversations).
#
# Secrets required:
#   BASE44_API_KEY        — Base44 agent API key
#   WARP_WEBHOOK_SECRET   — gateWebhook secret (optional, untuk PrEvent entity sync)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

  issues:
    types: [opened, edited, labeled, closed]

  issue_comment:
    types: [created]

  pull_request_review_comment:
    types: [created]

permissions:
  pull-requests: read
  issues: read
  contents: read

jobs:
  dispatch:
    name: WARP•GATE Dispatch
    runs-on: ubuntu-latest

    # Filter out bot noise dan non-WARP branches untuk PR events
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'warp-gate[bot]' &&
      github.actor != 'coderabbitai[bot]'

    steps:
      - name: Dispatch to WARP•GATE
        env:
          BASE44_API_KEY:       ${{ secrets.BASE44_API_KEY }}
          WARP_WEBHOOK_SECRET:  ${{ secrets.WARP_WEBHOOK_SECRET }}
          GITHUB_EVENT_NAME:    ${{ github.event_name }}
          GITHUB_EVENT_ACTION:  ${{ github.event.action }}
          GITHUB_ACTOR:         ${{ github.actor }}
          GITHUB_REPO:          ${{ github.repository }}

          # pull_request fields
          PR_NUMBER:   ${{ github.event.pull_request.number }}
          PR_TITLE:    ${{ github.event.pull_request.title }}
          PR_BRANCH:   ${{ github.event.pull_request.head.ref }}
          PR_SHA:      ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR:   ${{ github.event.pull_request.user.login }}
          PR_URL:      ${{ github.event.pull_request.html_url }}
          PR_MERGED:   ${{ github.event.pull_request.merged }}

          # issues fields
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_URL:    ${{ github.event.issue.html_url }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
          ISSUE_BODY:   ${{ github.event.issue.body }}

          # comment fields (issue_comment + pr_review_comment)
          COMMENT_BODY:   ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_URL:    ${{ github.event.comment.html_url }}
          # untuk issue_comment: apakah ini di PR atau issue biasa
          COMMENT_IS_PR:  ${{ github.event.issue.pull_request != null }}
          COMMENT_PR_NUM: ${{ github.event.issue.number }}
          COMMENT_PR_TITLE: ${{ github.event.issue.title }}

        run: |
          python3 - << 'PYEOF'
import json, os, sys, urllib.request, urllib.error

BASE44_URL = "https://app.base44.com/api/agents/69f0641f438b21f8ef2e1218/conversations"
WEBHOOK_URL = "https://warpcmd-ef2e1218.base44.app/functions/gateWebhook"

api_key = os.environ.get("BASE44_API_KEY", "").strip()
secret  = os.environ.get("WARP_WEBHOOK_SECRET", "").strip()

if not api_key:
    print("ERROR: BASE44_API_KEY not set — aborting")
    sys.exit(1)

ev      = os.environ.get("GITHUB_EVENT_NAME", "")
action  = os.environ.get("GITHUB_EVENT_ACTION", "")
actor   = os.environ.get("GITHUB_ACTOR", "")
repo    = os.environ.get("GITHUB_REPO", "")


def post_base44(message: str):
    payload = {"messages": [{"role": "user", "content": message}]}
    data    = json.dumps(payload, ensure_ascii=True).encode("utf-8")
    req     = urllib.request.Request(
        BASE44_URL, data=data,
        headers={
            "Content-Type": "application/json",
            "api_key": api_key,
            "User-Agent": "WARP-Gate/4",
        },
        method="POST",
    )
    try:
        with urllib.request.urlopen(req, timeout=20) as r:
            body = r.read().decode("utf-8", errors="replace")[:300]
            print(f"Base44 : HTTP {r.status}  {body[:120]}")
            return r.status
    except urllib.error.HTTPError as e:
        print(f"Base44 ERROR: HTTP {e.code}  {e.read().decode(errors='replace')[:200]}")
        return e.code
    except Exception as e:
        print(f"Base44 ERROR: {e}")
        return 0


def post_webhook(envelope: dict):
    if not secret:
        print("WARN: WARP_WEBHOOK_SECRET not set — webhook skipped")
        return
    data = json.dumps(envelope, ensure_ascii=True).encode("utf-8")
    req  = urllib.request.Request(
        WEBHOOK_URL, data=data,
        headers={
            "Content-Type": "application/json",
            "x-warp-secret": secret,
            "User-Agent": "WARP-Gate/4",
        },
        method="POST",
    )
    try:
        with urllib.request.urlopen(req, timeout=20) as r:
            print(f"Webhook: HTTP {r.status}")
    except Exception as e:
        print(f"Webhook WARN: {e}")


# ─── pull_request ────────────────────────────────────────────────────────────
if ev == "pull_request":
    num     = os.environ.get("PR_NUMBER", "0")
    title   = os.environ.get("PR_TITLE", "")
    branch  = os.environ.get("PR_BRANCH", "")
    sha     = os.environ.get("PR_SHA", "")
    author  = os.environ.get("PR_AUTHOR", "")
    url     = os.environ.get("PR_URL", "")
    merged  = os.environ.get("PR_MERGED", "false")

    # Skip non-WARP branches
    if not branch.startswith("WARP/"):
        print(f"SKIP: branch '{branch}' is not WARP/ — no notification needed")
        sys.exit(0)

    status_note = ""
    if action == "closed":
        status_note = f"\nStatus : {'MERGED ✅' if merged == 'true' else 'CLOSED (not merged)'}"

    msg = (
        f"WARP\u2022GATE EVENT: pull_request.{action}\n\n"
        f"Repo   : {repo}\n"
        f"PR     : #{num} \u2014 {title}\n"
        f"Branch : {branch}\n"
        f"SHA    : {sha[:12]}\n"
        f"Author : {author}\n"
        f"URL    : {url}"
        f"{status_note}\n\n"
    )

    if action == "opened":
        msg += "Run full gate review per AGENTS.md. Check tier, declarations, hard stops, forge report, state files. Post one batched DECISION comment on the PR."
    elif action in ("synchronize", "reopened"):
        msg += "PR updated — re-run gate checks if SHA changed. Verify no new P0/P1 since last review."
    elif action == "ready_for_review":
        msg += "PR marked ready for review — run full gate review if not yet done."
    elif action == "closed":
        if merged == "true":
            msg += "PR merged — run post-merge sync: PROJECT_STATE.md + WORKTODO.md + CHANGELOG.md in one commit cycle."
        else:
            msg += "PR closed without merge — no action required unless CMD decision needed."

    envelope = {
        "event": ev, "action": action, "repo": repo, "actor": actor,
        "pull_request": {
            "number": int(num) if num.isdigit() else 0,
            "title": title, "branch": branch, "sha": sha,
            "author": author, "url": url,
        },
    }
    post_base44(msg)
    post_webhook(envelope)


# ─── issues ──────────────────────────────────────────────────────────────────
elif ev == "issues":
    num    = os.environ.get("ISSUE_NUMBER", "0")
    title  = os.environ.get("ISSUE_TITLE", "")
    url    = os.environ.get("ISSUE_URL", "")
    labels_raw = os.environ.get("ISSUE_LABELS", "[]")
    body   = os.environ.get("ISSUE_BODY", "")[:400]

    try:
        labels_list = json.loads(labels_raw)
        labels = ", ".join(l.get("name","") for l in labels_list) if labels_list else ""
    except Exception:
        labels = labels_raw[:100]

    sentinel_hint = ""
    if any(kw in labels for kw in ("major", "agent:sentinel", "warp-core")):
        sentinel_hint = "\n\n⚠️ Label major/sentinel detected — assess if WARP•SENTINEL routing required."

    msg = (
        f"WARP\u2022GATE EVENT: issues.{action}\n\n"
        f"Repo   : {repo}\n"
        f"Issue  : #{num} \u2014 {title}\n"
        f"Labels : {labels}\n"
        f"Actor  : {actor}\n"
        f"URL    : {url}\n"
        f"Body   : {body[:200]}"
        f"{sentinel_hint}\n\n"
        f"Assess and route per AGENTS.md."
    )

    envelope = {
        "event": ev, "action": action, "repo": repo, "actor": actor,
        "issue": {
            "number": int(num) if num.isdigit() else 0,
            "title": title, "labels": labels, "url": url,
        },
    }
    post_base44(msg)
    post_webhook(envelope)


# ─── issue_comment ────────────────────────────────────────────────────────────
elif ev == "issue_comment":
    is_pr   = os.environ.get("COMMENT_IS_PR", "false").lower() == "true"
    num     = os.environ.get("COMMENT_PR_NUM", "0")
    title   = os.environ.get("COMMENT_PR_TITLE", "")
    cbody   = os.environ.get("COMMENT_BODY", "")[:400]
    cauthor = os.environ.get("COMMENT_AUTHOR", "")
    curl    = os.environ.get("COMMENT_URL", "")

    # Skip bot comments
    if any(b in cauthor for b in ["bot]", "coderabbitai"]):
        print(f"SKIP: bot comment from {cauthor}")
        sys.exit(0)

    kind = "PR" if is_pr else "Issue"
    msg = (
        f"WARP\u2022GATE EVENT: issue_comment on {kind}\n\n"
        f"Repo    : {repo}\n"
        f"{kind}    : #{num} \u2014 {title}\n"
        f"Author  : {cauthor}\n"
        f"Comment : {cbody}\n"
        f"URL     : {curl}\n\n"
    )
    if is_pr:
        msg += "Classify and route per PR REVIEW AUTO-TRIAGE in COMMANDER.md."
    else:
        msg += "Assess if WARP\u2022FORGE task or WARP\u2022SENTINEL routing required."

    envelope = {
        "event": ev, "action": action, "repo": repo,
        "is_pr": is_pr,
        "item": {"number": int(num) if num.isdigit() else 0, "title": title},
        "comment": {"body": cbody[:300], "author": cauthor, "url": curl},
    }
    post_base44(msg)
    post_webhook(envelope)


# ─── pull_request_review_comment ─────────────────────────────────────────────
elif ev == "pull_request_review_comment":
    num     = os.environ.get("PR_NUMBER", "0")
    title   = os.environ.get("PR_TITLE", "")
    branch  = os.environ.get("PR_BRANCH", "")
    pr_url  = os.environ.get("PR_URL", "")
    cbody   = os.environ.get("COMMENT_BODY", "")[:400]
    cauthor = os.environ.get("COMMENT_AUTHOR", "")
    curl    = os.environ.get("COMMENT_URL", "")

    if any(b in cauthor for b in ["bot]", "coderabbitai"]):
        print(f"SKIP: bot review comment from {cauthor}")
        sys.exit(0)

    msg = (
        f"WARP\u2022GATE EVENT: pr_review_comment\n\n"
        f"Repo    : {repo}\n"
        f"PR      : #{num} \u2014 {title}\n"
        f"Branch  : {branch}\n"
        f"Comment : {cbody}\n"
        f"Author  : {cauthor}\n"
        f"URL     : {curl}\n\n"
        f"Classify and route per PR REVIEW AUTO-TRIAGE in COMMANDER.md."
    )

    envelope = {
        "event": ev, "action": action, "repo": repo,
        "pull_request": {"number": int(num) if num.isdigit() else 0,
                         "title": title, "branch": branch, "url": pr_url},
        "comment": {"body": cbody[:300], "author": cauthor, "url": curl},
    }
    post_base44(msg)
    post_webhook(envelope)

else:
    print(f"Unknown event: {ev!r} — skip")

sys.exit(0)
PYEOF

