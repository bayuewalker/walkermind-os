name: WARP•GATE Notify

on:
  pull_request:
    types: [opened, closed, reopened, synchronize, ready_for_review]
  issues:
    types: [opened, closed, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  notify:
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Set up job
        run: echo "event=${{ github.event_name }} action=${{ github.event.action }}"

      - name: Compose payload
        id: msg
        env:
          GH_EVENT: ${{ toJson(github.event) }}
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            pull_request)
              NUM=$(echo "$GH_EVENT"      | jq -r '.pull_request.number')
              TITLE=$(echo "$GH_EVENT"    | jq -r '.pull_request.title')
              HEAD=$(echo "$GH_EVENT"     | jq -r '.pull_request.head.ref')
              BASE=$(echo "$GH_EVENT"     | jq -r '.pull_request.base.ref')
              URL=$(echo "$GH_EVENT"      | jq -r '.pull_request.html_url')
              HEAD_SHA=$(echo "$GH_EVENT" | jq -r '.pull_request.head.sha')
              MERGED=$(echo "$GH_EVENT"   | jq -r '.pull_request.merged')
              STATE="$ACTION"
              if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
                STATE="merged"
              fi
              KIND="pull_request.${STATE}"
              ;;
            issues)
              NUM=$(echo "$GH_EVENT"   | jq -r '.issue.number')
              TITLE=$(echo "$GH_EVENT" | jq -r '.issue.title')
              URL=$(echo "$GH_EVENT"   | jq -r '.issue.html_url')
              HEAD=""
              HEAD_SHA=""
              KIND="issues.${ACTION}"
              ;;
            *)
              echo "unsupported event $EVENT_NAME — skip"
              exit 0
              ;;
          esac

          EOF_NUM=$(uuidgen)
          EOF_KIND=$(uuidgen)
          EOF_TITLE=$(uuidgen)
          EOF_HEAD=$(uuidgen)
          EOF_SHA=$(uuidgen)
          EOF_URL=$(uuidgen)
          {
            printf 'num<<%s\n%s\n%s\n'   "$EOF_NUM"   "$NUM"      "$EOF_NUM"
            printf 'kind<<%s\n%s\n%s\n'  "$EOF_KIND"  "$KIND"     "$EOF_KIND"
            printf 'title<<%s\n%s\n%s\n' "$EOF_TITLE" "$TITLE"    "$EOF_TITLE"
            printf 'head<<%s\n%s\n%s\n'  "$EOF_HEAD"  "$HEAD"     "$EOF_HEAD"
            printf 'sha<<%s\n%s\n%s\n'   "$EOF_SHA"   "$HEAD_SHA" "$EOF_SHA"
            printf 'url<<%s\n%s\n%s\n'   "$EOF_URL"   "$URL"      "$EOF_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          KIND:     ${{ steps.msg.outputs.kind }}
          NUM:      ${{ steps.msg.outputs.num }}
          TITLE:    ${{ steps.msg.outputs.title }}
          HEAD:     ${{ steps.msg.outputs.head }}
          URL:      ${{ steps.msg.outputs.url }}
          ACTOR:    ${{ github.actor }}
          REPO:     ${{ github.repository }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "telegram secrets missing — skip"; exit 0
          fi
          TG_MSG=$(printf '%s #%s: %s\nbranch: %s\nactor: @%s\n%s' \
            "$KIND" "$NUM" "$TITLE" "$HEAD" "$ACTOR" "$URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --connect-timeout 5 --max-time 20 \
            -d "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${TG_MSG}" \
            -o /dev/null

      - name: Notify Base44 WARP CMD
        env:
          WEBHOOK_SECRET: ${{ secrets.WARP_WEBHOOK_SECRET }}
          KIND:      ${{ steps.msg.outputs.kind }}
          NUM:       ${{ steps.msg.outputs.num }}
          TITLE:     ${{ steps.msg.outputs.title }}
          HEAD:      ${{ steps.msg.outputs.head }}
          HEAD_SHA:  ${{ steps.msg.outputs.sha }}
          URL:       ${{ steps.msg.outputs.url }}
          ACTOR:     ${{ github.actor }}
          REPO:      ${{ github.repository }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_SECRET:-}" ]; then
            echo "WARP_WEBHOOK_SECRET missing — skip"; exit 0
          fi
          case "$KIND" in
            pull_request.opened|pull_request.reopened|pull_request.ready_for_review|pull_request.synchronize)
              GATE_STATUS="pending" ;;
            pull_request.merged)
              GATE_STATUS="merged" ;;
            *)
              echo "Non-gate event ($KIND) — skip"
              exit 0 ;;
          esac
          case "$HEAD" in
            WARP/GATE-*|WARP/STATE-SYNC-*|WARP/ECHO-*|WARP/TEST*|WARP/test-*)
              echo "excluded branch ${HEAD} — skip"; exit 0 ;;
          esac
          PR_NUM=$(echo "$NUM" | tr -d '[:space:]')
          if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "null" ]; then
            echo "invalid PR number — skip"; exit 0
          fi
          PAYLOAD=$(jq -n \
            --argjson pr  "$PR_NUM" \
            --arg branch  "$HEAD" \
            --arg repo    "$REPO" \
            --arg title   "$TITLE" \
            --arg author  "$ACTOR" \
            --arg sha     "$HEAD_SHA" \
            --arg status  "$GATE_STATUS" \
            '{pr_number:$pr, branch:$branch, repo:$repo, title:$title, author:$author, head_sha:$sha, gate_status:$status, tier:"UNKNOWN", review_cycle:1}')
          curl -fsS -X POST \
            "https://warpcmd-ef2e1218.base44.app/gateWebhook" \
            -H "Content-Type: application/json" \
            -H "x-warp-secret: ${WEBHOOK_SECRET}" \
            -d "$PAYLOAD" \
            -o /dev/null
          echo "PrEvent dispatched for PR #${PR_NUM} status=${GATE_STATUS}"

      - name: Complete job
        run: echo "done"
