name: WARP•GATE Notify

on:
  pull_request:
    types: [opened, closed, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  notify:
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Set up job
        run: echo "event=${{ github.event_name }} action=${{ github.event.action }}"

      - name: Compose messages
        id: msg
        env:
          GH_EVENT: ${{ toJson(github.event) }}
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            pull_request)
              NUM=$(jq -r   '.pull_request.number'     <<<$GH_EVENT)
              TITLE=$(jq -r '.pull_request.title'      <<<$GH_EVENT)
              HEAD=$(jq -r  '.pull_request.head.ref'   <<<$GH_EVENT)
              BASE=$(jq -r  '.pull_request.base.ref'   <<<$GH_EVENT)
              URL=$(jq -r   '.pull_request.html_url'   <<<$GH_EVENT)
              BODY=$(jq -r  '.pull_request.body // ""' <<<$GH_EVENT)
              HEAD_SHA=$(jq -r '.pull_request.head.sha' <<<$GH_EVENT)
              MERGED=$(jq -r '.pull_request.merged'    <<<$GH_EVENT)
              STATE="$ACTION"
              ICON="🔀"
              if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
                STATE="merged"; ICON="✅"
              fi
              KIND="pull_request.${STATE}"
              REF="PR #${NUM}"
              META="branch: ${HEAD} → ${BASE}"
              ;;
            pull_request_review)
              NUM=$(jq -r    '.pull_request.number' <<<$GH_EVENT)
              TITLE=$(jq -r  '.pull_request.title'  <<<$GH_EVENT)
              URL=$(jq -r    '.review.html_url'     <<<$GH_EVENT)
              BODY=$(jq -r   '.review.body // ""' <<<$GH_EVENT)
              HEAD=$(jq -r   '.pull_request.head.ref' <<<$GH_EVENT)
              HEAD_SHA=$(jq -r '.pull_request.head.sha' <<<$GH_EVENT)
              RSTATE=$(jq -r '.review.state' <<<$GH_EVENT)
              ICON="🔍"; KIND="pull_request_review.${RSTATE}"; REF="PR #${NUM}"
              META="review_state: ${RSTATE}"
              ;;
            pull_request_review_comment)
              NUM=$(jq -r   '.pull_request.number'  <<<$GH_EVENT)
              TITLE=$(jq -r '.pull_request.title'   <<<$GH_EVENT)
              URL=$(jq -r   '.comment.html_url'     <<<$GH_EVENT)
              BODY=$(jq -r  '.comment.body // ""' <<<$GH_EVENT)
              HEAD=$(jq -r  '.pull_request.head.ref' <<<$GH_EVENT)
              HEAD_SHA=$(jq -r '.pull_request.head.sha' <<<$GH_EVENT)
              FILE=$(jq -r  '.comment.path' <<<$GH_EVENT)
              ICON="💬"; KIND="pull_request_review_comment.created"; REF="PR #${NUM}"
              META="file: ${FILE}"
              ;;
            issues)
              NUM=$(jq -r   '.issue.number'      <<<$GH_EVENT)
              TITLE=$(jq -r '.issue.title'       <<<$GH_EVENT)
              URL=$(jq -r   '.issue.html_url'    <<<$GH_EVENT)
              BODY=$(jq -r  '.issue.body // ""' <<<$GH_EVENT)
              HEAD=""; HEAD_SHA=""
              LABELS=$(jq -r '[.issue.labels[].name] | join(", ")' <<<$GH_EVENT)
              ICON="🐛"; if [ "$ACTION" = "closed" ]; then ICON="✅"; fi
              KIND="issues.${ACTION}"; REF="Issue #${NUM}"
              META="labels: ${LABELS:-none}"
              ;;
            issue_comment)
              NUM=$(jq -r    '.issue.number'      <<<$GH_EVENT)
              TITLE=$(jq -r  '.issue.title'       <<<$GH_EVENT)
              URL=$(jq -r    '.comment.html_url'  <<<$GH_EVENT)
              BODY=$(jq -r   '.comment.body // ""' <<<$GH_EVENT)
              HEAD=""; HEAD_SHA=""
              TARGET=$(jq -r 'if .issue.pull_request then "PR" else "Issue" end' <<<$GH_EVENT)
              ICON="💬"; KIND="issue_comment.created"; REF="${TARGET} #${NUM}"
              META="target: ${TARGET}"
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME"; exit 0;;
          esac

          BODY_TG=$(printf "%s" "$BODY" | head -c 300)
          BODY_B44=$(printf "%s" "$BODY" | head -c 2000)

          TG_TEXT="${ICON} ${REF} ${ACTION}
Repo: ${REPO}
Title: ${TITLE}
${META}
Actor: @${ACTOR}
${URL}

${BODY_TG}"

          TG_EOF="TG_EOF_$(uuidgen)"
          B44_EOF="B44_EOF_$(uuidgen)"
          {
            echo "tg_text<<${TG_EOF}"
            echo "$TG_TEXT"
            echo "${TG_EOF}"
            echo "b44_num<<${B44_EOF}"
            echo "${NUM}"
            echo "${B44_EOF}"
            echo "b44_kind<<${B44_EOF}"
            echo "${KIND}"
            echo "${B44_EOF}"
            echo "b44_title<<${B44_EOF}"
            echo "${TITLE}"
            echo "${B44_EOF}"
            echo "b44_head<<${B44_EOF}"
            echo "${HEAD}"
            echo "${B44_EOF}"
            echo "b44_head_sha<<${B44_EOF}"
            echo "${HEAD_SHA}"
            echo "${B44_EOF}"
            echo "b44_url<<${B44_EOF}"
            echo "${URL}"
            echo "${B44_EOF}"
            echo "b44_actor<<${B44_EOF}"
            echo "${ACTOR}"
            echo "${B44_EOF}"
            echo "b44_body<<${B44_EOF}"
            echo "${BODY_B44}"
            echo "${B44_EOF}"
          } >>"$GITHUB_OUTPUT"

      - name: Notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG:      ${{ steps.msg.outputs.tg_text }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "telegram secrets missing — skip"; exit 0
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --connect-timeout 5 --max-time 20 \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=false" \
            -o /dev/null

      - name: Notify Base44 WARP CMD
        env:
          WEBHOOK_SECRET: ${{ secrets.WARP_WEBHOOK_SECRET }}
          KIND:      ${{ steps.msg.outputs.b44_kind }}
          NUM:       ${{ steps.msg.outputs.b44_num }}
          TITLE:     ${{ steps.msg.outputs.b44_title }}
          HEAD:      ${{ steps.msg.outputs.b44_head }}
          HEAD_SHA:  ${{ steps.msg.outputs.b44_head_sha }}
          URL:       ${{ steps.msg.outputs.b44_url }}
          ACTOR:     ${{ steps.msg.outputs.b44_actor }}
          BODY:      ${{ steps.msg.outputs.b44_body }}
          REPO:      ${{ github.repository }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_SECRET:-}" ]; then
            echo "WARP_WEBHOOK_SECRET missing — skip"; exit 0
          fi
          # Only create PrEvent for pull_request events (opened/reopened/ready_for_review)
          # Merged events get gate_status=merged; others get pending
          if [[ "$KIND" == pull_request.opened || "$KIND" == pull_request.reopened || "$KIND" == pull_request.ready_for_review ]]; then
            GATE_STATUS="pending"
          elif [[ "$KIND" == pull_request.merged ]]; then
            GATE_STATUS="merged"
          else
            echo "Non-PR event ($KIND) — skipping PrEvent creation"; exit 0
          fi

          # Skip bots, GATE/STATE-SYNC/ECHO branches
          if [[ "${ACTOR}" == *"[bot]"* ]]; then echo "bot actor — skip"; exit 0; fi
          if [[ "${HEAD}" == WARP/GATE-* || "${HEAD}" == WARP/STATE-SYNC-* || "${HEAD}" == WARP/ECHO-* ]]; then
            echo "excluded branch ${HEAD} — skip"; exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg pr     "$NUM" \
            --arg branch "$HEAD" \
            --arg repo   "$REPO" \
            --arg title  "$TITLE" \
            --arg author "$ACTOR" \
            --arg sha    "$HEAD_SHA" \
            --arg status "$GATE_STATUS" \
            '{pr_number:($pr|tonumber), branch:$branch, repo:$repo, title:$title, author:$author, head_sha:$sha, gate_status:$status, tier:"UNKNOWN", review_cycle:1}')

          curl -fsS -X POST \
            "https://warpcmd-ef2e1218.base44.app/gateWebhook" \
            -H "Content-Type: application/json" \
            -H "x-warp-secret: ${WEBHOOK_SECRET}" \
            -d "$PAYLOAD" \
            -o /dev/null

      - name: Complete job
        run: echo "done"
