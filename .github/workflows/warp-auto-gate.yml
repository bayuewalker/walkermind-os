name: WARP Auto Gate v1

# Evaluates AGENTS.md PR gate rules on every WARP/* PR event and whenever
# a tracked CI workflow completes. Posts or updates one idempotent comment
# (marker: <!-- WARP-AUTO-GATE -->) and fails the job when P0/P1 blockers
# are found.  Auto-merge is intentionally out of scope for v1.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows:
      - "CrusaderBot CI"
      - "CrusaderBot CD"
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to re-gate"
        required: true
        type: string

permissions:
  pull-requests: write
  checks: read
  contents: read

jobs:
  warp-gate:
    name: WARP Auto Gate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.head_commit.author.name != 'warp-gate[bot]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run WARP Auto Gate
        id: gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: python3 scripts/warp_auto_gate.py

      - name: Telegram Notification
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GATE_RESULT: ${{ steps.gate.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref || github.event.workflow_run.head_branch || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request

          bot_token   = os.environ["BOT_TOKEN"]
          chat_id     = os.environ["CHAT_ID"]
          gate_result = os.environ.get("GATE_RESULT", "unknown")
          pr_number   = os.environ.get("PR_NUMBER", "")
          pr_branch   = os.environ.get("PR_BRANCH", "")
          pr_url      = os.environ.get("PR_URL", "")

          # Route emoji
          if gate_result == "success":
              icon = "✅"
              route = "PASSED"
          elif gate_result == "failure":
              icon = "🛑"
              route = "BLOCKED"
          else:
              icon = "⚠️"
              route = gate_result.upper()

          # Inline mention by user ID — reliable in any chat type
          # [walk3r69](tg://user?id=5642722297)
          pr_line = f"PR [\\#{pr_number}]({pr_url})" if pr_url else f"PR \\#{pr_number}"
          branch_line = f"`{pr_branch}`" if pr_branch else "\\-"

          text = (
              f"{icon} *WARP AUTO GATE — {route}*\n\n"
              f"[walk3r69](tg://user?id=5642722297)\n\n"
              f"{pr_line}\n"
              f"Branch: {branch_line}"
          )

          payload = json.dumps({
              "chat_id": chat_id,
              "text": text,
              "parse_mode": "MarkdownV2",
              "disable_web_page_preview": True,
          }).encode("utf-8")

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{bot_token}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print(f"Telegram OK {resp.status}")
          except Exception as e:
              print(f"Telegram WARN: {e}")
          EOF
