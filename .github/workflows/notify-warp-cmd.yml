name: Notify WARP CMD on PR

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  notify-warp-cmd:
    name: Send PR notification to WARP CMD
    runs-on: ubuntu-latest
    continue-on-error: true
    if: startsWith(github.head_ref, 'WARP/')

    steps:
      - name: Send notification to Base44 WARP CMD
        env:
          WARP_WEBHOOK_SECRET: ${{ secrets.WARP_WEBHOOK_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, urllib.error, time

          ENDPOINT = "https://warpcmd-ef2e1218.base44.app/functions/prNotifyWarpCmd"
          TIMEOUT = 30
          MAX_RETRIES = 2

          payload = {
              "secret":     os.environ["WARP_WEBHOOK_SECRET"],
              "pr_number":  os.environ.get("PR_NUMBER", "?"),
              "pr_title":   os.environ.get("PR_TITLE", ""),
              "pr_url":     os.environ.get("PR_URL", ""),
              "event":      os.environ.get("EVENT_ACTION", "update"),
          }

          data = json.dumps(payload).encode("utf-8")

          for attempt in range(1, MAX_RETRIES + 1):
              req = urllib.request.Request(
                  ENDPOINT, data=data,
                  headers={"Content-Type": "application/json", "User-Agent": "WalkerMind-WARP-CMD/2.0"},
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req, timeout=TIMEOUT) as resp:
                      print(f"OK: {json.loads(resp.read())}")
                      exit(0)
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"[attempt {attempt}] HTTP {e.code}: {body}")
                  if e.code < 500:
                      # 4xx — no point retrying
                      print("WARNING: non-retryable HTTP error, skipping notification")
                      exit(0)
              except Exception as e:
                  print(f"[attempt {attempt}] ERROR: {e}")

              if attempt < MAX_RETRIES:
                  time.sleep(5)

          print("WARNING: all attempts failed, notification skipped")
          EOF
