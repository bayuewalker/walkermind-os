name: WARP Gate -- PR Review Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  gate-webhook:
    name: Trigger WARP CMD Gate
    runs-on: ubuntu-latest
    if: |
      startsWith(github.head_ref, 'WARP/') &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'warp-gate[bot]'

    steps:
      - name: Send PR event to WARP CMD
        env:
          BASE44_API_KEY:      ${{ secrets.BASE44_API_KEY }}
          WARP_WEBHOOK_SECRET: ${{ secrets.WARP_WEBHOOK_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_SHA:    ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_ACTION: ${{ github.event.action }}
          PR_URL:    ${{ github.event.pull_request.html_url }}
          PR_REPO:   ${{ github.repository }}
        run: |
          cat > /tmp/gate_dispatch.py << 'ENDPY'
import os, json, urllib.request, urllib.error, sys

base44_url  = "https://app.base44.com/api/agents/69f0641f438b21f8ef2e1218/conversations"
webhook_url = "https://warpcmd-ef2e1218.base44.app/functions/gateWebhook"
api_key = os.environ.get("BASE44_API_KEY", "")
secret  = os.environ.get("WARP_WEBHOOK_SECRET", "")

number = os.environ.get("PR_NUMBER", "0")
title  = os.environ.get("PR_TITLE",  "")
branch = os.environ.get("PR_BRANCH", "")
sha    = os.environ.get("PR_SHA",    "")
author = os.environ.get("PR_AUTHOR", "")
action = os.environ.get("PR_ACTION", "")
url    = os.environ.get("PR_URL",    "")
repo   = os.environ.get("PR_REPO",   "")

if not api_key or not secret:
    print("WARN: secrets not configured -- skip")
    sys.exit(0)

envelope = {
    "event": "pull_request", "action": action, "repo": repo,
    "pull_request": {
        "number": int(number) if number.isdigit() else 0,
        "title": title, "branch": branch, "sha": sha,
        "author": author, "url": url,
    },
}

message = (
    "WARP GATE EVENT: pull_request." + action + "\n\n"
    "Repo   : " + repo + "\n"
    "PR     : #" + number + " -- " + title + "\n"
    "Branch : " + branch + "\n"
    "SHA    : " + sha + "\n"
    "Author : " + author + "\n"
    "URL    : " + url + "\n\n"
    "Run gate review per AGENTS.md. Check tier, declarations, hard stops, "
    "forge report, state files. Post one batched DECISION comment on the PR."
)

def post(endpoint, headers, body):
    data = json.dumps(body, ensure_ascii=True).encode("utf-8")
    req  = urllib.request.Request(endpoint, data=data, headers=headers, method="POST")
    try:
        with urllib.request.urlopen(req, timeout=20) as r:
            return r.status, r.read().decode("utf-8", errors="replace")[:300]
    except urllib.error.HTTPError as e:
        return e.code, e.read().decode("utf-8", errors="replace")[:200]
    except Exception as e:
        return 0, str(e)[:200]

s1, b1 = post(base44_url,
    {"Content-Type": "application/json", "api_key": api_key, "User-Agent": "WARP-Gate/3"},
    {"messages": [{"role": "user", "content": message}]})
print("Base44  : HTTP %d  %s" % (s1, b1[:120]))

s2, b2 = post(webhook_url,
    {"Content-Type": "application/json", "x-warp-secret": secret, "User-Agent": "WARP-Gate/3"},
    envelope)
print("Webhook : HTTP %d  %s" % (s2, b2[:120]))
ENDPY
          python3 /tmp/gate_dispatch.py
