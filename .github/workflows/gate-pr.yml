name: WARP Gate -- PR Review Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gate-webhook:
    name: Trigger WARP CMD Gate
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'WARP/')

    steps:
      - name: Send PR event to WARP gate_webhook
        env:
          WARP_SECRET: ${{ secrets.WARP_WEBHOOK_SECRET }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_ACTION: ${{ github.event.action }}
          PR_REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request

          WEBHOOK  = "https://warpcmd-ef2e1218.base44.app/functions/gateWebhook"
          BASE44   = "https://app.base44.com/api/agents/69f0641f438b21f8ef2e1218/conversations"

          number = os.environ.get("PR_NUMBER", "0")
          title  = os.environ.get("PR_TITLE", "")
          branch = os.environ.get("PR_BRANCH", "")
          sha    = os.environ.get("PR_SHA", "")
          author = os.environ.get("PR_AUTHOR", "")
          action = os.environ.get("PR_ACTION", "")
          repo   = os.environ.get("PR_REPO", "")
          url    = os.environ.get("PR_URL", "")

          payload = {
              "action": action,
              "pull_request": {
                  "number": int(number) if number.isdigit() else 0,
                  "title": title,
                  "body": os.environ.get("PR_BODY", ""),
                  "head": {"ref": branch, "sha": sha},
                  "user": {"login": author},
              },
              "repository": {"full_name": repo},
          }

          def post(endpoint, headers, body):
              data = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(endpoint, data=data, headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return r.status, r.read().decode()[:300]
              except Exception as e:
                  return 0, str(e)

          # 1. Webhook
          s1, b1 = post(WEBHOOK, {
              "Content-Type": "application/json",
              "x-warp-secret": os.environ["WARP_SECRET"],
              "User-Agent": "WalkerMind-WARP-CMD/2.0",
          }, payload)
          print(f"Webhook : {s1} {b1[:120]}")
          if s1 not in (200, 201, 202):
              print("WARNING: webhook failed")

          # 2. Base44 agent notification
          api_key = os.environ.get("BASE44_API_KEY", "")
          if api_key:
              msg = (
                  "WARP GATE EVENT: pull_request." + action + "\n\n"
                  "Repo   : " + repo + "\n"
                  "PR     : #" + number + " -- " + title + "\n"
                  "Branch : " + branch + "\n"
                  "SHA    : " + sha + "\n"
                  "Author : " + author + "\n"
                  "URL    : " + url + "\n\n"
                  "Run gate review per AGENTS.md. Check tier, declarations, "
                  "hard stops, forge report, state files. Post one batched DECISION comment on the PR."
              )
              s2, b2 = post(BASE44, {
                  "Content-Type": "application/json",
                  "api_key": api_key,
                  "User-Agent": "WARP-Gate/3",
              }, {"messages": [{"role": "user", "content": msg}]})
              print(f"Base44  : {s2} {b2[:120]}")
          EOF
