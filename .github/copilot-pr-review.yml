# .github/workflows/copilot-pr-review.yml
# Pre-merge gate for all PRs to main
# Walker AI Team — NEXUS Guard
# Blocking conditions: B1–B12 per AGENTS.md

name: NEXUS PR Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  pre-merge-gate:
    name: Pre-Merge Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Pre-Merge Gate
        id: gate
        run: |
          echo "========================================"
          echo "  NEXUS PRE-MERGE GATE"
          echo "  PR: ${{ github.event.pull_request.title }}"
          echo "========================================"
          FAILED=0
          WARNINGS=""

          # ── B5: No phase* folders ───────────────────────────────────────
          if find . -type d -name "phase*" ! -path "./.git/*" | grep -q .; then
            echo "❌ B5: phase* folder found — must be deleted"
            find . -type d -name "phase*" ! -path "./.git/*"
            FAILED=1
          else
            echo "✅ B5: No phase* folders"
          fi

          # ── B6: No files outside domain structure ───────────────────────
          CHANGED=$(git diff --name-only origin/main...HEAD || true)
          OUTSIDE=$(echo "$CHANGED" \
            | grep -v "^\.github/" \
            | grep -v "^docs/" \
            | grep -v "^projects/" \
            | grep -v "^lib/" \
            | grep -v "^\.claude/" \
            | grep -v "^PROJECT_STATE\.md$" \
            | grep -v "^AGENTS\.md$" \
            | grep -v "^CLAUDE\.md$" \
            | grep -v "^NEXUS_KNOWLEDGE\.md$" \
            | grep -v "^README\.md$" \
            | grep -v "^\.env\.example$" \
            | grep -v "^\.gitignore$" \
            | grep -v "^requirements.*\.txt$" \
            | grep -Ev "^(core|data|strategy|intelligence|risk|execution|monitoring|api|infra|backtest|reports|lib)/" \
            || true)
          if [ -n "$OUTSIDE" ]; then
            echo "❌ B6: Files outside domain structure:"
            echo "$OUTSIDE"
            FAILED=1
          else
            echo "✅ B6: All files within domain structure"
          fi

          # ── B4: PROJECT_STATE.md updated ────────────────────────────────
          # Only required if code files changed (not SENTINEL/BRIEFER report-only PRs)
          CODE_CHANGED=$(echo "$CHANGED" \
            | grep -Ev "reports/sentinel/|reports/briefer/" \
            | grep -v "^PROJECT_STATE\.md$" \
            | grep -v "^\.github/" \
            | wc -l || true)
          if [ "$CODE_CHANGED" -gt 0 ]; then
            if ! echo "$CHANGED" | grep -q "PROJECT_STATE\.md"; then
              echo "❌ B4: PROJECT_STATE.md not updated (code changed in PR)"
              FAILED=1
            else
              echo "✅ B4: PROJECT_STATE.md updated"
              # Check timestamp format YYYY-MM-DD HH:MM
              if ! grep -E "📅 Last Updated\s*:\s*[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}" PROJECT_STATE.md > /dev/null 2>&1; then
                echo "⚠️  B4 WARN: Last Updated timestamp may not use YYYY-MM-DD HH:MM format"
                WARNINGS="${WARNINGS}timestamp_format "
              else
                echo "✅ B4: Timestamp format correct (YYYY-MM-DD HH:MM)"
              fi
            fi
          else
            echo "ℹ️  B4: Report-only PR — PROJECT_STATE check skipped"
          fi

          # ── B1: FORGE-X report exists ────────────────────────────────────
          # Use flexible pattern — supports all projects (not hardcoded to polyquantbot)
          FORGE_REPORTS=$(echo "$CHANGED" \
            | grep -E "reports/forge/[^/]+\.md$" \
            || true)
          # Skip B1 for SENTINEL/BRIEFER-only PRs
          SENTINEL_ONLY=$(echo "$CHANGED" | grep -E "reports/sentinel/|reports/briefer/" | wc -l)
          FORGE_COUNT=$(echo "$FORGE_REPORTS" | grep -c . || true)
          if [ "$CODE_CHANGED" -gt 0 ] && [ "$FORGE_COUNT" -eq 0 ]; then
            echo "❌ B1: No FORGE-X report found in reports/forge/"
            FAILED=1
          elif [ "$FORGE_COUNT" -gt 0 ]; then
            echo "✅ B1: FORGE-X report found ($FORGE_COUNT file(s))"
          else
            echo "ℹ️  B1: No code changes — FORGE-X report check skipped"
          fi

          # ── B2: Report naming format ─────────────────────────────────────
          for REPORT in $FORGE_REPORTS; do
            BASENAME=$(basename "$REPORT")
            if ! echo "$BASENAME" | grep -qE "^[0-9]+_[0-9]+_[a-z0-9_]+\.md$"; then
              echo "❌ B2: Invalid report name: $BASENAME"
              echo "   Expected: [phase]_[increment]_[name].md (e.g. 24_1_validation_engine.md)"
              FAILED=1
            else
              echo "✅ B2: Report naming valid: $BASENAME"
            fi
          done

          # ── B3: Report content — 6 sections + Validation Tier ────────────
          for REPORT in $FORGE_REPORTS; do
            if [ -f "$REPORT" ]; then
              echo "   Checking report content: $REPORT"
              MISSING_SECTIONS=0
              for SECTION in "What was built" "Current system architecture" "Files created" "What is working" "Known issues" "What is next"; do
                if ! grep -qi "$SECTION" "$REPORT"; then
                  echo "❌ B3: Missing section in report: '$SECTION'"
                  FAILED=1
                  MISSING_SECTIONS=1
                fi
              done
              if [ "$MISSING_SECTIONS" -eq 0 ]; then
                echo "✅ B3: All 6 report sections present"
              fi
              # Check Validation Tier declared
              if ! grep -qiE "Validation Tier\s*:" "$REPORT"; then
                echo "❌ B3: Missing 'Validation Tier' declaration in report"
                FAILED=1
              else
                echo "✅ B3: Validation Tier declared"
              fi
              # Check Claim Level declared
              if ! grep -qiE "Claim Level\s*:" "$REPORT"; then
                echo "❌ B3: Missing 'Claim Level' declaration in report"
                FAILED=1
              else
                echo "✅ B3: Claim Level declared"
              fi
            fi
          done

          # ── B7: No hardcoded secrets ─────────────────────────────────────
          SECRET_PATTERNS="sk-ant-[a-z]|sk-[a-z0-9]{20}|ANTHROPIC_API_KEY\s*=\s*['\"][a-zA-Z]|password\s*=\s*['\"][^$\{]|token\s*=\s*['\"][^$\{]|api_key\s*=\s*['\"][^$\{]"
          if git diff origin/main...HEAD -- "*.py" "*.env" "*.json" "*.yaml" "*.yml" \
            | grep -v "\.env\.example" \
            | grep -qE "$SECRET_PATTERNS"; then
            echo "❌ B7: Potential hardcoded secret detected"
            FAILED=1
          else
            echo "✅ B7: No hardcoded secrets detected"
          fi

          # ── B8: No full Kelly (α=1.0) ────────────────────────────────────
          if git diff origin/main...HEAD -- "*.py" \
            | grep -qE "kelly.*=.*1\.0|alpha.*=.*1\.0|KELLY_FRACTION.*=.*1\.0|KELLY.*=.*1[^0-9.]"; then
            echo "❌ B8: Full Kelly (α=1.0) detected — must use 0.25"
            FAILED=1
          else
            echo "✅ B8: No full Kelly usage"
          fi

          # ── B9: RISK layer not bypassed before EXECUTION ─────────────────
          if git diff origin/main...HEAD -- "*.py" \
            | grep -qE "execute|place_order|submit_order" ; then
            # Check if execution calls appear without risk check nearby
            if git diff origin/main...HEAD -- "*.py" \
              | grep -B5 -E "execute|place_order|submit_order" \
              | grep -qvE "risk|kelly|position_size|max_position|check_risk|validate_risk"; then
              echo "⚠️  B9 WARN: Execution calls detected — verify RISK layer is not bypassed"
              WARNINGS="${WARNINGS}risk_bypass_check "
            else
              echo "✅ B9: Execution code includes risk context"
            fi
          else
            echo "✅ B9: No new execution calls detected"
          fi

          # ── B10: No silent exceptions ────────────────────────────────────
          if git diff origin/main...HEAD -- "*.py" \
            | grep -qE "^\+\s*(except\s*:\s*pass|except Exception\s*:\s*pass|except\s+\w+\s*:\s*pass)"; then
            echo "❌ B10: Silent exception detected (except: pass)"
            FAILED=1
          else
            echo "✅ B10: No silent exceptions"
          fi

          # ── B11: No threading ────────────────────────────────────────────
          if git diff origin/main...HEAD -- "*.py" \
            | grep -qE "^\+\s*(import threading|from threading import)"; then
            echo "❌ B11: threading import detected — use asyncio only"
            FAILED=1
          else
            echo "✅ B11: No threading imports"
          fi

          # ── B12: ENABLE_LIVE_TRADING guard not bypassed ──────────────────
          if git diff origin/main...HEAD -- "*.py" | grep -qE "ENABLE_LIVE_TRADING"; then
            if git diff origin/main...HEAD -- "*.py" \
              | grep -qE "ENABLE_LIVE_TRADING\s*=\s*True|ENABLE_LIVE_TRADING\s*=\s*1" \
              && ! git diff origin/main...HEAD -- "*.py" \
              | grep -qE "if.*ENABLE_LIVE_TRADING|ENABLE_LIVE_TRADING.*check|getenv.*ENABLE_LIVE_TRADING"; then
              echo "❌ B12: ENABLE_LIVE_TRADING guard may be bypassed"
              FAILED=1
            else
              echo "✅ B12: ENABLE_LIVE_TRADING guard present"
            fi
          else
            echo "✅ B12: No live trading guard changes"
          fi

          # ── Commit batch size (advisory only) ────────────────────────────
          MAX_FILES=0
          for COMMIT in $(git log origin/main...HEAD --format="%H"); do
            COUNT=$(git show --name-only --format="" "$COMMIT" | grep -c . || true)
            if [ "$COUNT" -gt "$MAX_FILES" ]; then
              MAX_FILES=$COUNT
            fi
          done
          if [ "$MAX_FILES" -gt 10 ]; then
            echo "⚠️  Batch size: largest commit has $MAX_FILES files (keep to ≤5 when possible)"
            WARNINGS="${WARNINGS}batch_size "
          else
            echo "✅ Batch size: max $MAX_FILES files per commit"
          fi

          # ── Final result ─────────────────────────────────────────────────
          echo ""
          echo "========================================"
          if [ "$FAILED" -eq 1 ]; then
            echo "  RESULT: 🚫 BLOCKED"
            echo "GATE_RESULT=BLOCKED" >> $GITHUB_OUTPUT
            echo "WARNINGS=${WARNINGS}" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "  RESULT: ✅ PASS"
            echo "GATE_RESULT=PASS" >> $GITHUB_OUTPUT
            echo "WARNINGS=${WARNINGS}" >> $GITHUB_OUTPUT
          fi
          echo "========================================"

      # ── PR comment: BLOCKED ────────────────────────────────────────────────
      - name: Comment — BLOCKED
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚫 NEXUS PRE-GATE — BLOCKED

**DO NOT MERGE — fix all blockers first.**

📋 [View full gate log](${runUrl})

**Blocker reference:**

| Code | Condition |
|---|---|
| B1 | FORGE-X report missing from \`reports/forge/\` |
| B2 | Report naming format invalid |
| B3 | Report missing sections / Tier / Claim Level |
| B4 | \`PROJECT_STATE.md\` not updated |
| B5 | \`phase*/\` folder present |
| B6 | File outside domain structure |
| B7 | Hardcoded secret detected |
| B8 | Full Kelly (α=1.0) used |
| B9 | RISK layer bypass detected |
| B10 | Silent exception (\`except: pass\`) |
| B11 | \`import threading\` found |
| B12 | \`ENABLE_LIVE_TRADING\` guard bypassed |

Fix all blockers → push again → gate will re-run automatically.

---
*NEXUS PR Gate — Walker AI Team*`
            });

      # ── PR comment: PASS ───────────────────────────────────────────────────
      - name: Comment — PASS
        if: success()
        uses: actions/github-script@v7
        env:
          WARNINGS: ${{ steps.gate.outputs.WARNINGS }}
        with:
          script: |
            const warnings = process.env.WARNINGS || '';
            const hasWarnings = warnings.trim().length > 0;
            const warningNote = hasWarnings
              ? `\n\n⚠️ **Warnings (non-blocking):** ${warnings.trim().split(' ').join(', ')}`
              : '';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ NEXUS PRE-GATE — PASSED${warningNote}

| Check | Result |
|---|---|
| B5: No \`phase*/\` folders | ✅ |
| B6: Domain structure | ✅ |
| B4: \`PROJECT_STATE.md\` updated | ✅ |
| B1: FORGE-X report present | ✅ |
| B2: Report naming format | ✅ |
| B3: Report sections + Tier + Claim Level | ✅ |
| B7: No hardcoded secrets | ✅ |
| B8: No full Kelly | ✅ |
| B9: RISK layer check | ✅ |
| B10: No silent exceptions | ✅ |
| B11: No threading | ✅ |
| B12: Live trading guard | ✅ |

**Next step — based on Validation Tier declared in forge report:**

| Tier | Next Step |
|---|---|
| MINOR | COMMANDER review → merge decision |
| STANDARD | COMMANDER review → merge / hold / rework |
| MAJOR | SENTINEL validation required before merge |

---
*NEXUS PR Gate — Walker AI Team*`
            });
