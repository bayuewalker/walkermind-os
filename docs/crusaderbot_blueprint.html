<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrusaderBot - Core Blueprint Decision Matrix</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify for security -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050608; color: #cbd5e1; }
        .cubes-bg { background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); background-repeat: repeat; }
        
        /* Typography Tweaks matching the beautiful React layout */
        .custom-prose { font-size: 0.875rem; color: #e2e8f0; }
        .custom-prose h1 { display: flex; align-items: center; gap: 0.75rem; font-size: 1.875rem; font-weight: 700; background: linear-gradient(to right, #34d399, #22d3ee); -webkit-background-clip: text; color: transparent; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(30,41,59,0.8); }
        .custom-prose h2 { display: flex; align-items: center; gap: 0.5rem; font-size: 1.25rem; font-weight: 700; background: linear-gradient(to right, #f1f5f9, #94a3b8); -webkit-background-clip: text; color: transparent; margin-top: 2.5rem; margin-bottom: 1.25rem; }
        .custom-prose h3 { display: flex; align-items: center; gap: 0.5rem; color: #f59e0b; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.68rem; margin-top: 2rem; margin-bottom: 1rem; font-family: 'JetBrains Mono', monospace; font-weight: 700; line-height: 1.5; }
        .custom-prose ul { padding-left: 0; list-style: none; margin-top: 1.5rem; margin-bottom: 1.5rem; }
        .custom-prose li { display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.84rem; line-height: 1.7; margin-bottom: 0.75rem; color: #cbd5e1; }
        .custom-prose p { margin-bottom: 1.25rem; font-size: 0.9rem; line-height: 1.7; color: #cbd5e1; }
        .custom-prose a { color: #34d399; text-decoration: none; transition: all 0.2s; }
        .custom-prose a:hover { text-decoration: underline; color: #10b981; }
        .custom-prose blockquote { position: relative; border-left: 3px solid rgba(16,185,129,0.5); background-color: rgba(16,185,129,0.05); padding: 1rem 1rem 1rem 1.25rem; margin: 2rem 0; border-radius: 0 0.5rem 0.5rem 0; font-style: italic; box-shadow: inset 0 0 20px rgba(16,185,129,0.02); }
        .custom-prose pre { background-color: #0b0e14; border: 1px solid rgba(51,65,85,0.5); border-radius: 0.5rem; overflow: auto; padding: 1.25rem; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: #a6accd; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: 2rem 0; }
        .custom-prose code { color: #fde68a; background-color: rgba(15,23,42,1); padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; }
        .custom-prose pre code { background: transparent; padding: 0; color: inherit; font-size: inherit; }
        .custom-prose strong { color: #e2e8f0; font-weight: 600; }
        
        /* Terminal Window UI */
        .mac-terminal-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; background-color: rgba(5,6,8,0.8); border-bottom: 1px solid rgba(30,41,59,0.8); backdrop-filter: blur(4px); margin: -1.25rem -1.25rem 1.25rem -1.25rem; }
        .mac-btn { width: 10px; height: 10px; border-radius: 50%; }
        .mac-close { background-color: rgba(244,63,94,0.6); box-shadow: 0 0 8px rgba(244,63,94,0.4); }
        .mac-min { background-color: rgba(245,158,11,0.6); box-shadow: 0 0 8px rgba(245,158,11,0.4); }
        .mac-max { background-color: rgba(16,185,129,0.6); box-shadow: 0 0 8px rgba(16,185,129,0.4); }
        .term-title { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; font-family: 'JetBrains Mono', monospace; }
        
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
        .animate-ping { animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; }
        
        /* Fade in animation for sequential load */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="cubes-bg relative min-h-screen pb-20">
    <div class="absolute inset-0 bg-gradient-to-b from-[#050608] via-transparent to-[#050608] pointer-events-none z-0 fixed h-screen w-full"></div>
    
    <div class="max-w-4xl mx-auto p-4 md:p-12 relative z-10 w-full pt-12 md:pt-20">
        <!-- Glassmorphism Container Engine -->
        <div class="relative bg-[#050608]/80 backdrop-blur-md border border-slate-700/50 rounded-xl p-6 md:p-12 shadow-2xl overflow-hidden group">
            <!-- Watermark Bot -->
            <div class="absolute top-0 right-0 p-4 opacity-[0.02] group-hover:opacity-[0.05] transition-opacity duration-1000 pointer-events-none scale-150 origin-top-right">
                <i data-lucide="bot" style="width: 250px; height: 250px; color: #cbd5e1;"></i>
            </div>
            
            <!-- Loading State -->
            <div id="loading" class="text-emerald-500 font-mono text-[11px] uppercase tracking-widest flex flex-col items-center justify-center gap-4 py-20">
                <div class="relative flex h-4 w-4">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500"></span>
                </div>
                <span>Syncing Master Blueprint from Source...</span>
            </div>

            <!-- Rendered Content Target -->
            <div id="content" class="relative z-10 custom-prose hidden fade-in"></div>
        </div>
    </div>

    <script>
        // Advanced Custom Renderers to match React aesthetics
        const renderer = {
            heading(text, level) {
                if (level === 1) return `<h1><i data-lucide="brain-circuit" class="text-emerald-400 w-7 h-7"></i> ${text}</h1>`;
                if (level === 2) return `<h2><i data-lucide="layers" class="text-slate-400 w-5 h-5"></i> ${text}</h2>`;
                if (level === 3) return `<h3><i data-lucide="chevron-right" class="text-amber-500 w-4 h-4"></i> ${text}</h3>`;
                return `<h${level}>${text}</h${level}>`;
            },
            listitem(text) {
                return `<li><div class="mt-[4px] shrink-0"><i data-lucide="check-circle-2" class="text-emerald-500/60 w-[13px] h-[13px]"></i></div><div>${text}</div></li>`;
            },
            blockquote(quote) {
                return `<blockquote>
                    <div class="absolute -left-[14px] -top-3 bg-[#0b0e14] rounded-full p-1 border border-slate-700 shadow-sm z-10">
                        <i data-lucide="activity" class="text-emerald-400 w-4 h-4"></i>
                    </div>
                    ${quote}
                </blockquote>`;
            }
        };

        marked.use({ renderer });

        async function loadBlueprint() {
            try {
                // Fetch source of truth markdown directly from your repository
                const response = await fetch('https://raw.githubusercontent.com/bayuewalker/walker-ai-team/main/docs/blueprint/crusaderbot.md');
                const markdown = await response.text();
                
                // Parse markdown to HTML
                const html = marked.parse(markdown);
                
                // Safely sanitize DOM to allow injecting SVG components via Data attributes
                const cleanHtml = DOMPurify.sanitize(html, { ADD_TAGS: ['i'], ADD_ATTR: ['data-lucide'] });
                
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = cleanHtml;
                
                // Inject macOS style Terminal Window UI wrappers around all PRE blocks
                const pres = contentDiv.querySelectorAll('pre');
                pres.forEach(pre => {
                    const header = document.createElement('div');
                    header.className = 'mac-terminal-header';
                    header.innerHTML = `
                        <div class="mac-btn mac-close"></div>
                        <div class="mac-btn mac-min"></div>
                        <div class="mac-btn mac-max"></div>
                        <div class="term-title">
                            <i data-lucide="terminal-square" class="w-3 h-3 text-slate-500"></i> polyquantbot / run
                        </div>
                    `;
                    pre.insertBefore(header, pre.firstChild);
                });

                // Hide loading and show content
                document.getElementById('loading').classList.add('hidden');
                contentDiv.classList.remove('hidden');
                
                // Mount Lucide SVG Icons
                lucide.createIcons();
            } catch (error) {
                document.getElementById('loading').innerHTML = '<span class="text-rose-500 flex items-center gap-2 font-sans text-sm normal-case"><i data-lucide="alert-triangle"></i> Failed to synchronize blueprint. Please check your internet connection or GitHub repository availability.</span>';
                lucide.createIcons();
            }
        }

        window.onload = loadBlueprint;
    </script>
</body>
</html>
